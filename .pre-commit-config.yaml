repos:
  - repo: local
    hooks:
      - id: ruff-format-check
        name: Check ruff formatting
        entry: ruff format --check src scripts tests
        language: system
        pass_filenames: false
        always_run: true

      - id: ruff-lint
        name: Run ruff linter
        entry: ruff check src scripts tests
        language: system
        pass_filenames: false
        always_run: true

      - id: check-generated-plugins
        name: Check generated plugins match source
        entry: python scripts/generate_plugins.py --check
        language: system
        pass_filenames: false
        always_run: true

      - id: run-tests
        name: Run tests
        entry: python -m pytest
        language: system
        pass_filenames: false
        always_run: true
